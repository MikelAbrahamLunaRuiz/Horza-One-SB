spring.application.name=demo
server.port=${PORT:8080}

# =============================================================================
# BASE DE DATOS - Credenciales exclusivamente desde variables de entorno
# [SEGURIDAD] CWE-312: No almacenar credenciales en código fuente.
# Variables requeridas en Railway: MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD
# Para desarrollo local, definir estas variables en el sistema operativo o en .env (no commitear .env)
# =============================================================================
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================================================
# JPA / Hibernate
# [SEGURIDAD] show-sql=false en produccion para no exponer estructura de BD en logs
# [SEGURIDAD] ddl-auto=validate en produccion — nunca 'create' o 'create-drop'
# =============================================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=false

# =============================================================================
# LOGGING
# [SEGURIDAD] CWE-532: Nivel INFO en produccion. DEBUG solo bajo variable explicita.
# TRACE de Hibernate expone parametros de consultas SQL (incluidas contrasenas hasheadas).
# Activar DEBUG solo en desarrollo: LOG_LEVEL_APP=DEBUG
# =============================================================================
logging.level.com.example.demo=${LOG_LEVEL_APP:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOG_LEVEL_SQL:WARN}
logging.level.org.hibernate.orm.jdbc.bind=${LOG_LEVEL_SQL:WARN}

# =============================================================================
# TRANSACCIONES
# =============================================================================
spring.transaction.default-timeout=30
spring.transaction.rollback-on-commit-failure=true

# =============================================================================
# CARGA DE ARCHIVOS
# [SEGURIDAD] Limite de tamano para mitigar ataques DoS basicos por uploads masivos
# =============================================================================
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

# =============================================================================
# CORS - Origenes permitidos (ver CorsConfig.java)
# [SEGURIDAD] CWE-942: Cambiar en produccion al dominio real del front-end
# Ejemplo: cors.allowed.origins=https://miapp.com,https://app-movil.miapp.com
# =============================================================================
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000,http://localhost:8080}
cors.max.age=3600

# =============================================================================
# MANEJO DE ERRORES
# [SEGURIDAD] Deshabilitar detalles de error en respuestas HTTP (gestionado por GlobalExceptionHandler)
# =============================================================================
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-binding-errors=never

# =============================================================================
# CHATBOT IA - Groq API (llama-3.3-70b-versatile)
# Variable requerida: GROQ_API_KEY (obtener en console.groq.com)
# Modelo por defecto: llama-3.3-70b-versatile (gratuito, 14400 req/dia)
# Para usar otro modelo: GROQ_MODEL=llama3-8b-8192
# =============================================================================
groq.api.key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
